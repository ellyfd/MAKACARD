<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAKACARD | Org Quest</title>
    <link rel="stylesheet" href="styles.css?v=20260717-sandbox50">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">MAKACARD</p>
          <h1>Org Quest</h1>
          <p class="intro">正式組織、人才能力與跨單位任務的數位沙盤。</p>
        </div>
        <div class="header-metrics" aria-label="Dataset summary">
          <span><strong id="member-count">21</strong> people</span>
          <span><strong id="org-unit-count">--</strong> org nodes</span>
        </div>
      </header>

      <nav class="tabs" aria-label="MAKACARD views">
        <button class="tab active" type="button" data-view="meeting">Mission Run</button>
        <button class="tab" type="button" data-view="org">Digital Org</button>
        <button class="tab" type="button" data-view="lab">Draft Room</button>
      </nav>

      <section id="meeting-view" class="view active" aria-label="Mission Run">
        <div class="game-board">
          <section class="mission-panel">
            <div class="result-heading">
              <div>
                <p class="label">Live Mission</p>
                <h2 id="meeting-title">Mission Run</h2>
              </div>
              <span id="turn-count" class="fit-badge">Turn 1 / 5</span>
            </div>
            <p id="meeting-scenario" class="scenario-copy"></p>
            <div id="mission-brief" class="mission-brief"></div>
            <div class="meeting-stats">
              <article>
                <span>決策閉環</span>
                <meter id="trust-meter" min="0" max="100" value="45"></meter>
                <strong id="trust-value">45</strong>
              </article>
              <article>
                <span>依賴覆蓋</span>
                <meter id="clarity-meter" min="0" max="100" value="40"></meter>
                <strong id="clarity-value">40</strong>
              </article>
              <article>
                <span>事實一致</span>
                <meter id="momentum-meter" min="0" max="100" value="35"></meter>
                <strong id="momentum-value">35</strong>
              </article>
              <article>
                <span>交付可行</span>
                <meter id="friction-meter" min="0" max="100" value="25"></meter>
                <strong id="friction-value">25</strong>
              </article>
              <article>
                <span>韌性</span>
                <meter id="resilience-meter" min="0" max="100" value="35"></meter>
                <strong id="resilience-value">35</strong>
              </article>
            </div>
          </section>

          <section class="hand-panel">
            <div class="lane-heading">
              <div>
                <p class="label">Hand</p>
                <h2>本回合人物牌</h2>
              </div>
              <button id="reset-meeting" class="secondary-button compact" type="button">新任務</button>
            </div>
            <div id="action-cards" class="action-cards" aria-label="本回合人物牌"></div>
          </section>

          <section class="timeline-panel">
            <div class="lane-heading">
              <div>
                <p class="label">Run Log</p>
                <h2>解法生成軌跡</h2>
              </div>
            </div>
            <ol id="meeting-log" class="meeting-log"></ol>
          </section>
        </div>
      </section>

      <section id="org-view" class="view" aria-label="Digital Org">
        <div class="org-stage">
          <section class="org-toolbar">
            <div>
              <p class="label">Digital Org</p>
              <h2 id="org-title">Makalot 主架構</h2>
              <div id="org-legend" class="org-breadcrumb"></div>
            </div>
            <div class="org-actions">
              <input id="org-search" type="search" placeholder="搜尋姓名 / 部門 / 單位" aria-label="搜尋 Digital Org">
              <div class="zoom-controls" aria-label="組織圖縮放">
                <button id="org-zoom-out" class="icon-button" type="button" aria-label="縮小組織圖">－</button>
                <button id="org-zoom-reset" class="zoom-value" type="button" aria-label="重設組織圖倍率">100%</button>
                <button id="org-zoom-in" class="icon-button" type="button" aria-label="放大組織圖">＋</button>
              </div>
              <button id="org-back" class="secondary-button compact" type="button">上一層</button>
              <button id="org-home" class="secondary-button compact" type="button">回主架構</button>
            </div>
          </section>
          <section id="org-map" class="org-map" aria-label="Makalot digital organization map"></section>
          <div id="org-detail" class="org-focus-detail"></div>
        </div>
      </section>

      <section id="lab-view" class="view" aria-label="Draft Room">
        <div class="lab-layout">
          <section class="panel controls-panel">
            <p class="label">Team Draft</p>
            <h2>任務編隊桌</h2>
            <label>選擇任務<select id="scenario-select"></select></label>
            <label>授權者 Sponsor<select id="draft-sponsor"></select></label>
            <label>決策 owner<select id="draft-decision-owner"></select></label>
            <label>技術判定者<select id="draft-technical-authority"></select></label>
            <label>交付 owner<select id="draft-delivery-owner"></select></label>
            <label>資料 owner<select id="draft-data-owner"></select></label>
            <label>跨單位轉譯<select id="draft-bridge"></select></label>
            <button id="analyze-pair" class="primary-button" type="button">驗證編隊</button>
          </section>
          <section class="panel result-panel">
            <div class="result-heading">
              <div><p class="label">Draft Result</p><h2 id="pair-title">選任務並配置角色</h2></div>
              <span id="fit-badge" class="fit-badge">--</span>
            </div>
            <div id="score-grid" class="score-grid"></div>
            <div id="pair-insight" class="insight-box lab-insight"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="game-data.js?v=20260716-techrd49"></script>
    <script src="org-skill-data.js?v=20260716-techrd49"></script>
    <script src="newbiz-data.js?v=20260716-techrd49"></script>
    <script src="top-org-data.js?v=20260716-techrd49"></script>
    <script src="general-admin-data.js?v=20260716-techrd49"></script>
    <script src="sales-marketing-data.js?v=20260716-techrd49"></script>
    <script src="dev-tech-data.js?v=20260716-techrd49"></script>
    <script src="engineering-data.js?v=20260716-techrd49"></script>
    <script src="logistics-data.js?v=20260716-techrd49"></script>
    <script src="tech-rd-group-data.js?v=20260716-techrd49"></script>
    <script src="finance-data.js?v=20260716-techrd49"></script>
    <script src="it-data.js?v=20260716-techrd49"></script>
    <script src="birthday-data.js?v=20260716-techrd49"></script>
    <script src="reporting-data.js?v=20260716-techrd49"></script>
    <script src="org-sandbox-data.js?v=20260717-governance51"></script>
    <script src="public-data-governance.js?v=20260717-governance51"></script>
    <script src="game.js?v=20260717-governance51"></script>
  </body>
</html>
