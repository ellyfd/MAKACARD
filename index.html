<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skillforge Cards</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="table" aria-label="Skillforge card game">
        <header class="topbar">
          <div>
            <p class="kicker">Claude Skill Inspired Card Game</p>
            <h1>Skillforge Cards</h1>
          </div>
          <div class="round-panel" aria-live="polite">
            <span>Round</span>
            <strong id="round">1</strong>
          </div>
        </header>

        <section class="scoreboard" aria-label="Current agent stats">
          <article class="stat clarity">
            <span>清晰度</span>
            <strong id="clarity">0</strong>
          </article>
          <article class="stat reliability">
            <span>可靠度</span>
            <strong id="reliability">0</strong>
          </article>
          <article class="stat persona">
            <span>人格</span>
            <strong id="persona">0</strong>
          </article>
          <article class="stat context">
            <span>組織</span>
            <strong id="context">0</strong>
          </article>
        </section>

        <section class="mission-strip">
          <div>
            <p class="label">本局目標</p>
            <h2 id="mission-title"></h2>
          </div>
          <p id="mission-copy"></p>
        </section>

        <section class="play-area">
          <div class="lane">
            <div class="lane-heading">
              <span>手牌</span>
              <button id="draw-card" class="icon-button" type="button" title="抽一張卡" aria-label="抽一張卡">
                <span aria-hidden="true">+</span>
              </button>
            </div>
            <div id="hand" class="cards" aria-label="Playable cards"></div>
          </div>

          <aside class="console">
            <div class="console-art" aria-hidden="true">
              <svg viewBox="0 0 220 180" role="img">
                <path d="M25 128 88 22h64l43 75-64 57H60z" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round"/>
                <path d="m88 22 43 132M152 22 60 154M25 128h170" fill="none" stroke="currentColor" stroke-width="5" opacity=".55"/>
                <circle cx="88" cy="22" r="9" fill="currentColor"/>
                <circle cx="152" cy="22" r="9" fill="currentColor"/>
                <circle cx="25" cy="128" r="9" fill="currentColor"/>
                <circle cx="195" cy="128" r="9" fill="currentColor"/>
                <circle cx="131" cy="154" r="11" fill="currentColor"/>
              </svg>
            </div>
            <div>
              <p class="label">Elly Persona</p>
              <h2 id="persona-name">尚未成形</h2>
              <p id="persona-desc">打出卡牌後，代理會逐步獲得工作風格與技能骨架。</p>
            </div>
            <div class="threat">
              <span>Drift 壓力</span>
              <meter id="drift-meter" min="0" max="12" value="0"></meter>
              <strong id="drift">0</strong>
            </div>
            <button id="end-round" class="primary-button" type="button">結束回合</button>
            <button id="reset-game" class="secondary-button" type="button">重新開局</button>
          </aside>
        </section>

        <section class="built-zone">
          <div class="lane-heading">
            <span>已建構 Skill 架構</span>
            <span id="built-count">0 cards</span>
          </div>
          <div id="built" class="built-cards" aria-label="Built skill architecture"></div>
        </section>

        <section class="log-wrap">
          <div class="lane-heading">
            <span>系統紀錄</span>
            <span>讀取自 Makalot / Elly skills</span>
          </div>
          <ol id="log" class="log" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <script src="game-data.js"></script>
    <script src="game.js"></script>
  </body>
</html>
